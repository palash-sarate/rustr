name: Build and Release Rust Utilities

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: rcat, rls, rgrep, rfind, rfzf, rdu, rsed, rawk
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: rcat, rls, rgrep, rfind, rfzf, rdu, rsed, rawk
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: rcat, rls, rgrep, rfind, rfzf, rdu, rsed, rawk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build utilities
        working-directory: rust-utils
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Artifacts (Linux & macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          for bin in rcat rls rgrep rfind rfzf rdu rsed rawk; do
            cp rust-utils/target/${{ matrix.target }}/release/$bin dist/$bin-${{ matrix.target }}
          done

      - name: Prepare Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy rust-utils\target\${{ matrix.target }}\release\rcat.exe dist\rcat-${{ matrix.target }}.exe
          copy rust-utils\target\${{ matrix.target }}\release\rls.exe dist\rls-${{ matrix.target }}.exe
          copy rust-utils\target\${{ matrix.target }}\release\rgrep.exe dist\rgrep-${{ matrix.target }}.exe
          copy rust-utils\target\${{ matrix.target }}\release\rfind.exe dist\rfind-${{ matrix.target }}.exe
          copy rust-utils\target\${{ matrix.target }}\release\rfzf.exe dist\rfzf-${{ matrix.target }}.exe
          copy rust-utils\target\${{ matrix.target }}\release\rdu.exe dist\rdu-${{ matrix.target }}.exe
          copy rust-utils\target\${{ matrix.target }}\release\rsed.exe dist\rsed-${{ matrix.target }}.exe
          copy rust-utils\target\${{ matrix.target }}\release\rawk.exe dist\rawk-${{ matrix.target }}.exe

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
